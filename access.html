<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Check | Leaf Birthday</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            title: ["Bebas Neue", "sans-serif"],
            body: ["Barlow", "sans-serif"],
          },
          colors: {
            rivalsRed: "#ff335f",
            rivalsBlue: "#18dbff",
          },
          keyframes: {
            popIn: {
              "0%": { opacity: "0", transform: "translateY(14px) scale(0.98)" },
              "100%": { opacity: "1", transform: "translateY(0) scale(1)" },
            },
            pulseSoft: {
              "0%,100%": { opacity: ".35" },
              "50%": { opacity: ".8" },
            },
            shake: {
              "0%,100%": { transform: "translateX(0)" },
              "25%": { transform: "translateX(-4px)" },
              "75%": { transform: "translateX(4px)" },
            },
          },
          animation: {
            popIn: "popIn .7s cubic-bezier(.2,.8,.2,1)",
            pulseSoft: "pulseSoft 2.8s ease-in-out infinite",
            shake: "shake .28s linear",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background:
        url("mkkk.jpg"),
        radial-gradient(circle at 14% 14%, rgba(255, 51, 95, 0.2), transparent 34%),
        radial-gradient(circle at 86% 78%, rgba(24, 219, 255, 0.17), transparent 38%),
        linear-gradient(135deg, #020612, #0a1835 56%, #081329);
      background-size: cover, auto, auto, auto;
      background-position: center top, center, center, center;
      background-blend-mode: soft-light, normal, normal, normal;
      overflow-x: hidden;
    }

    .theme-btn {
      background: linear-gradient(150deg, #01275d, #680101);
      box-shadow: 0 10px 26px rgba(10, 22, 42, 0.45);
      transition: transform 180ms ease, box-shadow 220ms ease, filter 220ms ease;
    }

    .theme-btn:hover {
      box-shadow: 0 0 0 1px rgba(79, 140, 255, 0.4), 0 0 18px rgba(79, 140, 255, 0.35), 0 0 26px rgba(169, 54, 116, 0.28);
      filter: brightness(1.08);
    }
  </style>
</head>

<body class="font-body text-slate-100">
  <div class="fixed -left-24 -top-24 h-80 w-80 rounded-full bg-rivalsRed/25 blur-3xl animate-pulseSoft"></div>
  <div class="fixed -bottom-24 -right-20 h-80 w-80 rounded-full bg-rivalsBlue/20 blur-3xl animate-pulseSoft"></div>

  <main class="mx-auto grid min-h-screen w-full max-w-7xl place-items-center px-4 py-10">
    <section id="gate" class="w-full max-w-xl rounded-3xl border border-cyan-300/30 bg-slate-900/80 p-6 shadow-[0_0_0_1px_rgba(125,211,252,.25),0_20px_70px_rgba(2,6,23,.8)] backdrop-blur animate-popIn md:p-8">
      <p class="text-xs font-bold uppercase tracking-[0.22em] text-cyan-200">Access Check</p>
      <h1 class="mt-2 font-title text-5xl leading-none text-white">Birthday Card Security</h1>
      <p class="mt-3 text-sm text-slate-300">Only the birthday legend enters. What's your name?</p>

      <form id="nameForm" class="mt-5 flex gap-2">
        <input id="nameInput" type="text" autocomplete="off" placeholder="Enter your name" class="w-full rounded-xl border border-cyan-300/30 bg-slate-950/70 px-4 py-3 text-sm text-white outline-none placeholder:text-slate-500 focus:border-cyan-300/70" />
        <button type="submit" class="theme-btn rounded-xl px-4 py-3 text-xs font-bold uppercase tracking-wide text-white hover:scale-[1.03]">Enter</button>
      </form>

      <div id="confirmBox" class="mt-4 hidden rounded-xl border border-rose-300/35 bg-rose-500/10 p-4 text-sm">
        <p class="font-semibold text-rose-100">Are you leaf?</p>
        <div class="mt-3 flex gap-2">
          <button id="yesLeaf" class="rounded-lg bg-emerald-500 px-3 py-2 text-xs font-bold uppercase tracking-wide text-white">Yes, that's me</button>
          <button id="noLeaf" class="rounded-lg border border-slate-300/30 bg-slate-800/70 px-3 py-2 text-xs font-bold uppercase tracking-wide text-slate-100">No</button>
        </div>
      </div>

      <p id="gateHint" class="mt-3 text-xs text-slate-400">Hint: Birthday girl</p>
    </section>
  </main>

  <script>
    const gate = document.getElementById("gate");
    const nameForm = document.getElementById("nameForm");
    const nameInput = document.getElementById("nameInput");
    const gateHint = document.getElementById("gateHint");
    const confirmBox = document.getElementById("confirmBox");
    const yesLeaf = document.getElementById("yesLeaf");
    const noLeaf = document.getElementById("noLeaf");

    function goToMainCard() {
      window.location.href = "index.html";
    }

    nameForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();

      if (!name) {
        gateHint.textContent = "Type your name first";
        return;
      }

      if (name.toLowerCase() === "leaf") {
        goToMainCard();
      } else {
        confirmBox.classList.remove("hidden");
        gateHint.textContent = "Hmm... are you leaf?";
        gate.classList.remove("animate-shake");
        void gate.offsetWidth;
        gate.classList.add("animate-shake");
      }
    });

    yesLeaf.addEventListener("click", goToMainCard);

    noLeaf.addEventListener("click", () => {
      confirmBox.classList.add("hidden");
      nameInput.value = "";
      nameInput.focus();
      gateHint.textContent = "Try again... are you leaf?";
    });
  </script>
</body>

</html>
